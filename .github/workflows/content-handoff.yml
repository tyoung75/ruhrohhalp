name: Content Handoff

# Processes queued Threads content for publishing (non-Threads content stays as drafts).
# Reduced from 4x/day to 2x/day — aligns with briefing cadence, saves API tokens.
#
# Times are in UTC. Currently EDT (UTC-4):
#   10:00 UTC =  6:00 AM ET (morning, after briefing)
#   22:00 UTC =  6:00 PM ET (evening, peak engagement)

on:
  schedule:
    - cron: '0 10 * * *'   # 6:00 AM ET (EDT)
    - cron: '0 22 * * *'   # 6:00 PM ET (EDT)
  workflow_dispatch:

jobs:
  handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger content handoff
        run: |
          echo "Triggering content handoff at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.ruhrohhalp.com/api/internal/content-handoff" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: content-handoff returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Content handoff completed successfully"
