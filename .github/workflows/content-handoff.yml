name: Content Handoff

# Supplemental publish path — catches any queued Threads content that the
# primary Creator OS Publish Queue (cron-creator-publish) hasn't picked up.
# Limited to 2 posts per run, same as the primary publish path.
#
# Runs once daily in the early morning before the first publish window.
# The primary publish workflow handles all peak engagement windows
# (8 AM, 12 PM, 6 PM, 9:30 PM ET).
#
# Times are in UTC. Currently EDT (UTC-4):
#   10:00 UTC =  6:00 AM ET (morning, after briefing)

on:
  schedule:
    - cron: '0 10 * * *'   # 6:00 AM ET (EDT)
  workflow_dispatch:

jobs:
  handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger content handoff
        run: |
          echo "Triggering content handoff at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.ruhrohhalp.com/api/internal/content-handoff" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: content-handoff returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Content handoff completed successfully"
