name: Content Handoff
on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:

jobs:
  handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger content handoff
        run: |
          echo "Triggering content handoff at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.ruhrohhalp.com/api/internal/content-handoff" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: content-handoff returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Content handoff completed successfully"
