name: Creator OS — Publish Queue

# Hits /api/creator/publish-cowork three times daily during peak engagement windows.
# Each run publishes up to 2 posts (per-job cap) and respects the daily backfill cap (6/day).
# If earlier runs were skipped (laptop closed, etc.), later runs catch up within the cap.
#
# Times are in UTC. Currently EDT (UTC-4), so:
#   16:00 UTC = 12:00 PM ET  (midday window)
#   22:00 UTC =  6:00 PM ET  (evening window — highest engagement)
#   01:30 UTC =  9:30 PM ET  (late-night window)
#
# Note: During EST (Nov–Mar, UTC-5) these fire 1 hour earlier than ET.

on:
  schedule:
    - cron: "0 16 * * *"   # 12:00 PM ET (EDT) — midday
    - cron: "0 22 * * *"   #  6:00 PM ET (EDT) — evening
    - cron: "30 1 * * *"   #  9:30 PM ET (EDT) — late-night
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  publish:
    name: Publish queued posts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger publish-cowork endpoint
        run: |
          echo "Triggering /api/creator/publish-cowork at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ruhrohhalp.com/api/creator/publish-cowork" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: /api/creator/publish-cowork returned HTTP $http_code"
            exit 1
          fi

          published=$(echo "$body" | jq -r '.published // 0' 2>/dev/null)
          skipped=$(echo "$body" | jq -r '.skipped // 0' 2>/dev/null)
          echo "✓ Published: $published | Skipped: $skipped"
