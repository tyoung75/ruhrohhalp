name: Evening Briefing
on:
  schedule:
    - cron: '0 0 * * *' # 8 PM ET
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger evening briefing
        run: |
          curl -sf -X POST "${{ secrets.RUHROHHALP_URL }}/api/internal/briefing" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUHROHHALP_SECRET }}" \
            -d '{"type":"evening"}'
