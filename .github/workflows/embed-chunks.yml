name: Embed Chunks
on:
  schedule:
    - cron: '0 6 * * *' # 2 AM ET daily
  workflow_dispatch:

jobs:
  embed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger embedding pipeline
        run: |
          echo "Triggering embedding pipeline at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.ruhrohhalp.com/api/internal/embed-chunks" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: embed-chunks returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Embedding pipeline completed successfully"
