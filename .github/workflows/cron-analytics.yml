name: Creator Analytics Collection

# Collects post engagement metrics (impressions, likes, replies, follows gained)
# for content published in the last 30 days. Feeds into the scoring algorithm
# and content performance brain.
#
# Runs every 6 hours so the scoring algorithm always has fresh data:
#   6:00 AM ET (10:00 UTC) — morning, feeds into daily briefing
#  12:00 PM ET (16:00 UTC) — midday, after first publish window
#   6:00 PM ET (22:00 UTC) — evening, after peak publish window
#  12:00 AM ET (04:00 UTC) — overnight, catches late engagement

on:
  schedule:
    - cron: "0 10 * * *"   # 6:00 AM ET (EDT)
    - cron: "0 16 * * *"   # 12:00 PM ET (EDT)
    - cron: "0 22 * * *"   # 6:00 PM ET (EDT)
    - cron: "0 4 * * *"    # 12:00 AM ET (EDT)
  workflow_dispatch:

jobs:
  collect:
    name: Collect post analytics
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Trigger analytics collection
        run: |
          echo "Triggering analytics collection at $(date -u)"

          # curl can exit non-zero (e.g., timeout = 28) before we can print diagnostics.
          # Temporarily disable errexit so we can capture and report those failures clearly.
          set +e
          response=$(curl -sS -w "\n%{http_code}" -X GET \
            "https://www.ruhrohhalp.com/api/cron/creator-analytics" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --connect-timeout 20 \
            --max-time 300 \
            --retry 2 \
            --retry-all-errors \
            --retry-delay 5)
          curl_exit=$?
          set -e

          if [ "$curl_exit" -ne 0 ]; then
            echo "ERROR: curl failed before an HTTP response was received (exit code: $curl_exit)"
            if [ "$curl_exit" -eq 28 ]; then
              echo "Hint: exit code 28 is an operation timeout (likely API route took too long or network stalled)."
            fi
            exit 1
          fi

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: analytics collection returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Analytics collection completed successfully"
