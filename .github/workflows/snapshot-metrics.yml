name: Snapshot Metrics
on:
  schedule:
    - cron: '0 10 * * 0' # Sunday 6 AM ET
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger metric snapshot
        run: |
          echo "Triggering metric snapshot at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.ruhrohhalp.com/api/internal/snapshot-metrics" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: snapshot-metrics returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Metric snapshot completed successfully"
