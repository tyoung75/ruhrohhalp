name: Snapshot Metrics
on:
  schedule:
    - cron: '0 10 * * 0' # Sunday 6 AM ET
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger metric snapshot
        run: |
          curl -sf -X POST "${{ secrets.RUHROHHALP_URL }}/api/internal/snapshot-metrics" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUHROHHALP_SECRET }}"
