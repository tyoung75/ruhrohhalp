name: Score Tasks
on:
  schedule:
    - cron: '0 11 * * *' # 7 AM ET daily
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger task scoring
        run: |
          echo "Triggering task scoring at $(date -u)"
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://www.ruhrohhalp.com/api/internal/score-tasks" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP status: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" -ne 200 ]; then
            echo "ERROR: score-tasks returned HTTP $http_code"
            exit 1
          fi

          echo "✓ Task scoring completed successfully"
