name: Zombie Scan
on:
  schedule:
    - cron: '0 0 * * 0' # Sunday 8 PM ET
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger zombie scan
        run: |
          curl -sf -X POST "${{ secrets.RUHROHHALP_URL }}/api/internal/zombie-scan" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RUHROHHALP_SECRET }}"
